<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My predictions — Polla World Cup 2026</title>
  <meta name="theme-color" content="#eef4ef" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b120e" media="(prefers-color-scheme: dark)" />

<body>
  <main class="container">
    <header class="page-header">
      <p class="eyebrow">⚽ Polla · World Cup 2026</p>

  <script type="module" src="js/nav.js"></script>
