name: Deploy

# push-to-main only, deliberately no pull_request trigger: these jobs only
# mean anything once code has actually landed on main, and keeping them out
# of pull_request means they never show up as an extra (skipped) check on a
# PR — see ci.yml's test job for what actually gates a merge. Relies on
# main being protected so a PR can't merge without the test job passing;
# without that, a direct push of untested code would deploy here too.
on:
  push:
    branches: [main]

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache root node_modules
        id: cache-root
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-root-${{ hashFiles('package.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm install

      - name: Write service account credentials
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy Firestore rules
        run: npx firebase deploy --only firestore:rules --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json

  # Enforces the invariant the rules above depend on: no token is readable by
  # any client. The rules stop a stranger reading the users collection, but they
  # cannot un-store a token that's sitting in it — only this can, and a fix that
  # important must not depend on someone remembering to run a script by hand.
  #
  # Runs after deploy-rules so the two can never disagree about what's enforced,
  # idempotent, and performs zero writes once there's nothing left to migrate —
  # so on every subsequent deploy this is a cheap, self-verifying no-op.
  # Deliberately never passes --rotate: that invalidates every player's link and
  # is a hands-on decision, so migrate-tokens.js refuses it in CI outright.
  migrate-tokens:
    runs-on: ubuntu-latest
    needs: deploy-rules
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache automation node_modules
        id: cache-automation
        uses: actions/cache@v4
        with:
          path: automation/node_modules
          key: ${{ runner.os }}-npm-automation-${{ hashFiles('automation/package.json') }}

      - name: Install automation dependencies
        if: steps.cache-automation.outputs.cache-hit != 'true'
        run: npm install
        working-directory: automation

      - name: Move any client-readable token out of the users collection
        run: node migrate-tokens.js --apply
        working-directory: automation
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # wrangler 4.x requires Node >=22, see worker/package.json's engines field

      - name: Cache worker node_modules
        id: cache-worker
        uses: actions/cache@v4
        with:
          path: worker/node_modules
          key: ${{ runner.os }}-npm-worker-${{ hashFiles('worker/package.json') }}

      - name: Install worker dependencies
        if: steps.cache-worker.outputs.cache-hit != 'true'
        run: npm install
        working-directory: worker

      - name: Deploy Cloudflare Worker
        run: npm run deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
