name: Missing Predictions Report

on:
  workflow_dispatch: {} # manual only — trigger from the Actions tab (works from mobile)

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: automation

      - name: Check missing predictions
        working-directory: automation
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node missing-predictions.js
