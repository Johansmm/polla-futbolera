name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check frontend and admin scripts
        run: |
          for f in js/*.js admin/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Install root test dependencies
        run: npm install

      - name: Install admin script dependencies
        run: npm install
        working-directory: admin

      - name: Run Firestore security rules tests
        run: npm test
