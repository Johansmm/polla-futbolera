name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check all JS/MJS files
        run: |
          find . -type d \( -name node_modules -o -name .git \) -prune -o -type f \( -name '*.js' -o -name '*.mjs' \) -print | sort | while read -r f; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Cache root node_modules
        id: cache-root
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-root-${{ hashFiles('package.json') }}

      - name: Install root test dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm install

      - name: Cache admin node_modules
        id: cache-admin
        uses: actions/cache@v4
        with:
          path: admin/node_modules
          key: ${{ runner.os }}-npm-admin-${{ hashFiles('admin/package.json') }}

      - name: Install admin script dependencies
        if: steps.cache-admin.outputs.cache-hit != 'true'
        run: npm install
        working-directory: admin

      - name: Cache automation node_modules
        id: cache-automation
        uses: actions/cache@v4
        with:
          path: automation/node_modules
          key: ${{ runner.os }}-npm-automation-${{ hashFiles('automation/package.json') }}

      - name: Install automation script dependencies
        if: steps.cache-automation.outputs.cache-hit != 'true'
        run: npm install
        working-directory: automation

      - name: Run tests (Firestore rules + pure logic modules)
        run: npm test

  deploy-rules:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache root node_modules
        id: cache-root
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-root-${{ hashFiles('package.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm install

      - name: Write service account credentials
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy Firestore rules
        run: npx firebase deploy --only firestore:rules --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
