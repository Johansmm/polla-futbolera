<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Champion & Top Scorer — Poya World Cup 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <h1>Tournament Champion & Top Scorer</h1>
    <p><a id="predict-link" href="predict.html">← Back to my predictions</a></p>
    <p><a id="standings-link" href="standings.html">See the standings →</a></p>
    <p class="hint">You can change your pick as many times as you want until the first Round of 16 match kicks off.</p>
    <p id="status" class="status" hidden></p>

    <form id="special-form" hidden>
      <section class="phase-section">
        <h2>Champion</h2>
        <select id="champion-select"></select>
      </section>

      <section class="phase-section">
        <h2>Tournament Top Scorer</h2>
        <select id="scorer-team-select"></select>
        <select id="scorer-player-select" disabled></select>
      </section>

      <button type="submit" id="submit-btn">Save prediction</button>
      <div id="submit-feedback" class="save-feedback" hidden></div>
    </form>

    <div id="locked-view" hidden></div>
  </main>
  <script>
    const token = new URLSearchParams(window.location.search).get("token");
    if (token) {
      document.getElementById("predict-link").href = `predict.html?token=${encodeURIComponent(token)}`;
      document.getElementById("standings-link").href = `standings.html?token=${encodeURIComponent(token)}`;
    }
  </script>
  <script type="module" src="js/special.js"></script>
</body>
</html>
